services:
  boating-accident:
    image: ghcr.io/theoutdoorprogrammer/boating-accident:latest
    container_name: boating-accident
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - boating-accident-data:/data
    environment:
      # BOAT_DEV=true relaxes the Secure cookie flag so auth works over plain
      # http (local testing). Behind an HTTPS reverse proxy, set this to false.
      BOAT_DEV: "true"

volumes:
  boating-accident-data:
